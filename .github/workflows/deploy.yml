name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install

      - name: Generate settings-prod.js
        env:
          APIKEY: ${{ secrets.APIKEY }}
          PAGEID: ${{ vars.PAGEID }}
          ICONURL: ${{ vars.ICONURL }}
          WEBSITEURL: ${{ vars.WEBSITEURL }}
          SITEMAPBASEURL: ${{ vars.SITEMAPBASEURL }}
        run: |
          cat > /tmp/_footer << 'FOOTER_DELIM'
          ${{ vars.FOOTER }}
          FOOTER_DELIM
          cat > /tmp/_links << 'LINKS_DELIM'
          ${{ vars.LINKS }}
          LINKS_DELIM
          node << 'NODESCRIPT'
          const fs = require("fs");
          const footer = fs.readFileSync("/tmp/_footer", "utf8").trim();
          const links = fs.readFileSync("/tmp/_links", "utf8").trim();
          const s = JSON.stringify;
          const content = [
            "exports.Settings = {",
            `    "apiKey": ${s(process.env.APIKEY)},`,
            '    "buildDirectory": "build",',
            `    "pageID": ${s(process.env.PAGEID)},`,
            '    "templateHTML": "./templates/technical-doc/index.html",',
            '    "templateScript": "./templates/technical-doc/script.js",',
            '    "templateSiteMap": "./templates/technical-doc/sitemap.xml",',
            '    "ouputPageJSON": true,',
            `    "iconURL": ${s(process.env.ICONURL)},`,
            `    "websiteURL": ${s(process.env.WEBSITEURL)},`,
            `    "sitemapBaseURL": ${s(process.env.SITEMAPBASEURL)},`,
            '    "downloadImages": true,',
            `    "footer": ${s(footer)},`,
            `    "links": ${links},`,
            "}",
          ].join("\n");
          fs.writeFileSync("./settings-prod.js", content);
          NODESCRIPT

      - name: Build
        run: |
          mkdir -p build/images
          cp -r templates/technical-doc/* build/
          node notion2pages.js ./settings-prod.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
